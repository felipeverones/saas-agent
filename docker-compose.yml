# The full system: `docker compose up` brings up the vector store, the trace
# viewer and the API with zero manual steps (the API auto-ingests the seed
# corpus on first boot). For day-to-day development prefer `make up` (infra
# only) + `make run` (API from the venv) — no image rebuild per code change.

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Service names, not localhost: containers resolve each other by name
      # on the compose network.
      QDRANT_URL: http://qdrant:6333
      OTEL_EXPORTER_OTLP_ENDPOINT: http://phoenix:4317
      TRACING_ENABLED: "true"
      MEMORY_DB_PATH: /state/memory.sqlite
      CHECKPOINT_DB_PATH: /state/checkpoints.sqlite
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - fastembed_models:/models
      - api_state:/state
    depends_on:
      - qdrant
      - phoenix
  # Qdrant: our vector store. Chosen over Chroma because it has native hybrid
  # search (dense + sparse vectors fused server-side), which phase 2 depends on.
  qdrant:
    # Keep the server's minor version aligned with qdrant-client in
    # pyproject.toml — the client warns (and may misbehave) when they drift.
    image: qdrant/qdrant:v1.18.0
    ports:
      - "6333:6333"   # REST API + web dashboard (http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC (faster; the Python client uses it when available)
    volumes:
      # Named volume so ingested vectors survive `docker compose down`
      - qdrant_data:/qdrant/storage

  # Arize Phoenix: open-source trace viewer. Speaks standard OTLP, so our
  # OpenTelemetry spans (phase 8) show up here with zero vendor lock-in.
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"   # Web UI (http://localhost:6006)
      - "4317:4317"   # OTLP gRPC ingest — where the app exports spans

volumes:
  qdrant_data:
  fastembed_models:
  api_state:
